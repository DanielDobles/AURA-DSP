# AARS Bridge Configuration
# Connection details are loaded from the project .env file.
# Copy .env.example to .env and configure before first use.
server:
  host: "${DROPLET_IP}"
  port: 22
  user: "root"
  key_path: "${SSH_KEY_PATH}"

paths:
  local_input: "./input"
  local_output: "./output"
  remote_input: "/data/input"
  remote_output: "/data/output"

sync:
  poll_interval_seconds: 30
  upload_batch_size: 20
  verify_hash: true  # MD5 integrity check after transfer
